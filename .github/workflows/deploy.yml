name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_CV_FRONTEND_TR: ${{ vars.CV_FRONTEND_TR || 'YunusEmreGurlu_Frontend_Developer_CV_2026_TR.pdf' }}
          NEXT_PUBLIC_CV_FRONTEND_EN: ${{ vars.CV_FRONTEND_EN || 'YunusEmreGurlu_Frontend_Developer_CV_2026_EN.pdf' }}
          NEXT_PUBLIC_CV_FULLSTACK_TR: ${{ vars.CV_FULLSTACK_TR || 'YunusEmreGurlu_Full_Stack_Developer_CV_2026_EN.pdf' }}
          NEXT_PUBLIC_CV_FULLSTACK_EN: ${{ vars.CV_FULLSTACK_EN || 'YunusEmreGurlu_Full_Stack_Developer_CV_2026_EN.pdf' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
